[tests."cpython/Lib/test/test_weakset.py"]
status = "pass"
reason = "RFC 0039 WS5: all 46 cases pass. Required keying `weakref.ref` objects by their referent inside `set`/`dict` (CPython `weakref_richcompare`/`weakref_hash`): `DictKey`'s `Hash`/`Eq` now dispatch a builtin type's overriding `__eq__`/`__hash__` (not just user classes) via `instance_has_custom_dunder`, so equal refs collide into one bucket and dedup, with `weakref_native_hash` memoising the referent hash on the hot path. Also `_weakrefset.WeakSet` imported from the frozen `_weakrefset` (was an incomplete inline copy) and `supports_weakref` narrowed to CPython's `tp_weaklistoffset` set (so `ref([])`/`ref({})` raise `TypeError`)."

