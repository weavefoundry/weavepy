version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      cargo-deps:
        patterns: ["*"]
        update-types: ["patch", "minor", "major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      gha-deps:
        patterns: ["*"]
        update-types: ["patch", "minor", "major"]
