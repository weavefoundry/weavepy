# Regrtest baseline.
#
# Each `[tests."<label>"]` entry records the *expected* status for one
# regression test. The label format is `bundled/<filename>` for the
# fixtures in this directory and `cpython/Lib/test/<filename>` for tests
# pulled from a checked-out `vendor/cpython/`.
#
# Status values mirror `regrtest::TestStatus`:
#   pass    — runs cleanly
#   fail    — uncaught exception escapes the script
#   error   — pre-execution failure (parse/compile/IO)
#   skip    — explicitly skipped (won't run; useful for "blocked on X")
#   timeout — exceeded the per-test budget
#
# Tests not listed below default to "expect pass".
#
# `--check` (the default) makes `weavepy-conformance regrtest` exit
# non-zero on any divergence from this file. CI uses that to block
# regressions; refresh the baseline with `--no-check` when intentionally
# changing expectations.

timeout_seconds = 30

# ---------------------------------------------------------------------
# Bundled regression tests — everything in `tests/regrtest/` is expected
# to pass cleanly on `main`. Entries here document any temporary
# deviations from that bar.
# ---------------------------------------------------------------------

# (none currently — all bundled tests are expected to pass)

# ---------------------------------------------------------------------
# CPython `Lib/test/` allowlist. These are only attempted when
# `vendor/cpython/` is checked out; absent that, the runner silently
# omits them from discovery. Each entry should carry a `reason` so the
# next maintainer knows what they're looking at.
# ---------------------------------------------------------------------

[tests."cpython/Lib/test/test_grammar.py"]
status = "fail"
reason = "exercises features still in flight (top-level await, complex f-strings)"

[tests."cpython/Lib/test/test_tokenize.py"]
status = "skip"
reason = "imports CPython-only internals (tokenize.tokenize, encoding cookies)"

[tests."cpython/Lib/test/test_dict.py"]
status = "fail"
reason = "depends on dict order corner cases + leaking CPython implementation details"

[tests."cpython/Lib/test/test_list.py"]
status = "skip"
reason = "measured: past the sys.getsizeof/refcount probes it reaches the same gc.collect() reachable-hang as test_set (list/iterator reference cycles). Marked skip so CI doesn't stall 30s per run; tracked with test_set as a GC reachable-hang to revisit in wave 3."

[tests."cpython/Lib/test/test_set.py"]
status = "fail"
reason = "measured: completes within budget and fails on assertions. The former 'ran-further-now-slow' timeout was dominated by O(n^2) behaviour — every user-instance set element hashed to one bucket (DictKey had no __hash__/__eq__ hook). RFC 0037 now routes user-instance keys through Python __hash__/__eq__ (object.rs DictKey + Interpreter::reentrant_py_hash/eq), so sets of custom-hashable objects bucket properly and the suite runs to completion."

# RFC 0024 — real threads, GIL, cycle GC, weakrefs.
# These tests stress hardware-thread interleavings and CPython-
# specific GC bookkeeping. Our threading model is sub-interpreter-
# per-thread so target callables run cooperatively for now (RFC
# 0025 lifts that). They're listed here as `fail` so the baseline
# captures the gap explicitly; flip them to `pass` as the gaps
# close.

