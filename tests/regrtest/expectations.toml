[tests."cpython/Lib/test/test_gc.py"]
status = "pass"
reason = "RFC 0039 WS4/WS5: all 53 tests pass (11 skips for CPython-only refcount/sizeof probes), ~16s. Builds on this wave's generational collector (real (700,10,10) thresholds + gen0→1→2 promotion, gc.callbacks 'start'/'stop' ordering, get_referrers/get_referents graph walks, DEBUG_SAVEALL → gc.garbage) plus an older-generation refcount cascade: when a young-gen collection clears cyclic garbage that held the last reference to an object pinned in an older generation, that object is now reaped in the same pass and its weakref callback fires (test_bug1055820c), matching CPython's 'freed the instant refcount hits zero, regardless of generation' semantics. Finalizable orphans are deferred to a finalizing collection so __del__ ordering is preserved."

[tests."cpython/Lib/test/test_weakref.py"]
status = "timeout"
reason = "RFC 0039 WS5: the cyclic-GC hang is gone — WeakValueDictionary/WeakKeyDictionary were ported from CPython (O(1) id-keyed, `_IterationGuard`-deferred removal) over a real native `_weakref._remove_dead_weakref`, weakref callbacks now fire in CPython order (referent cleared -> oldest-first callbacks -> cycle broken) including the older-generation refcount cascade, and the threaded-consistency / self-cleaning cases pass. The module still exceeds the 60s budget (killed at 60s; ~125s at a larger budget): MappingTestCase alone is ~100s, dominated by the threaded stress loops (NUM_THREADED_ITERATIONS=100000, `collect_in_thread()` spinning `gc.collect()` every 5ms, and the 70k-entry dict-copy) — raw interpreter+collector throughput (CPython runs the same loops in <1s), not an algorithmic regression; deferred to the incremental-GC perf arc. The remaining assertion failures are object-model fidelity outside the concurrency scope: `weakref.ref` Python-subclassing (incl. `__slots__` + `getweakrefs` ordering), the weakproxy operator protocol (arithmetic/index/reversed/item-assign), ref/proxy identity reuse, and `WeakMethod` (a `ref` subclass) — deferred to an object-model wave."

