[tests."cpython/Lib/test/test_bdb.py"]
status = "pass"
reason = "RFC 0037 WS9: passes end-to-end (36 tests). Required faithful sys.settrace event fidelity in the VM dispatch loop: the frame-entry RESUME no longer emits a spurious 'line' event; an exception raised *inside* a trace callback propagates into the traced program (and disables the offending hook) for non-'exception' events while being swallowed on 'exception' events, matching CPython's call_trace_protected; Object::Frame compares by identity so bdb's `frame == self.stopframe`/returnframe checks work; generator/coroutine frames reuse one cached PyFrame snapshot across suspensions so frame identity is stable for set_next/until/return; FOR_ITER and SEND (`yield from`) surface a generator's terminating StopIteration to the 'exception' hook before swallowing it; END_FOR is attributed to the `for` line (not the loop body) so an exhausted loop emits no spurious body-line event; a frame popped by a propagating exception fires a 'return' event with arg None (sys.monitoring PY_UNWIND); and f_trace_lines / f_trace_opcodes are real per-frame flags driving 'opcode' events for bdb/pdb instruction stepping (set_stepinstr)."

