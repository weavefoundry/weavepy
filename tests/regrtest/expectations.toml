[tests."cpython/Lib/test/test_set.py"]
status = "pass"
# Correct verdict but ~54s of CPU (the O(n^2) hash-collision stress below).
# Raise the per-test budget so a loaded/throttled host doesn't SIGKILL it at
# the 60s boundary and flip a green run into a spurious timeout.
timeout_seconds = 150
reason = "RFC 0039 WS5: all cases pass. Builds on RFC 0037's Python `__hash__`/`__eq__` `DictKey` hook (so custom-hashable elements bucket properly instead of collapsing to one O(n^2) bucket) plus this wave's set fidelity: live `PyIterator::Set` size-change detection (`RuntimeError: Set changed size during iteration`), `__hash__`/`__eq__` exception propagation through `key_cmp_scope`, set-subclass `__getstate__`/pickling, and GC tracing through set iterators. The suite is dominated by `TestBinaryOpsMutating`'s deliberate hash-collision stress (every `Bad.__hash__` returns `randrange(2)`), so it runs ~54s — inherently slow (matching CPython's own characterisation), hence the raised per-test budget; the throughput itself is tracked in the interpreter-perf arc, not a correctness gap."

# RFC 0024 — real threads, GIL, cycle GC, weakrefs.
# These tests stress hardware-thread interleavings and CPython-
# specific GC bookkeeping. Our threading model is sub-interpreter-
# per-thread so target callables run cooperatively for now (RFC
# 0025 lifts that). They're listed here as `fail` so the baseline
# captures the gap explicitly; flip them to `pass` as the gaps
# close.

