name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets --all-features
      - run: cargo test --workspace --doc

  msrv:
    name: minimum supported rust version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read MSRV from Cargo.toml
        id: msrv
        shell: bash
        run: |
          msrv=$(grep -E '^rust-version' Cargo.toml | head -n1 | sed -E 's/.*"(.*)"/\1/')
          echo "msrv=$msrv" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --all-features

  conformance:
    name: cpython conformance (non-blocking)
    runs-on: ubuntu-latest
    # Non-blocking: the baseline is 0% match by design, and we don't want
    # PRs to fail until the harness has a meaningful floor. Promote to
    # blocking once the lexer is real (see docs/CONFORMANCE.md, Stage B).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Verify python oracle
        run: python3 -V
      - name: Run conformance harness
        run: cargo run --release -p weavepy-conformance -- run
      - name: Append report to job summary
        if: always()
        run: |
          {
            echo "## CPython conformance report"
            echo
            cat target/conformance/report.md || echo "(no report produced)"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-report
          path: target/conformance/
          if-no-files-found: warn
